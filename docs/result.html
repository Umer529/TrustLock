<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ScreenPact — Guardian Response</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#f0f2f5;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.card{
  background:#fff;border-radius:16px;padding:48px 36px;
  max-width:420px;width:100%;text-align:center;
  box-shadow:0 4px 24px rgba(0,0,0,.10);
}
.icon{
  width:80px;height:80px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:40px;margin:0 auto 28px;
}
h1{font-size:24px;font-weight:700;margin-bottom:12px}
p.msg{font-size:15px;color:#555;line-height:1.7;margin-bottom:36px}
.brand{font-size:12px;color:#bbb;border-top:1px solid #f0f0f0;padding-top:20px}
.brand strong{color:#9c6fff}
</style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Processing…</h1>
  <p class="msg" id="msg">Please wait while we record your response.</p>
  <p class="brand">Sent by <strong>ScreenPact</strong> &mdash; you can safely close this tab.</p>
</div>
<script>
(function(){
  var hash = location.hash.replace('#','').toLowerCase();
  var approved = hash === 'approved';
  var icon  = document.getElementById('icon');
  var title = document.getElementById('title');
  var msg   = document.getElementById('msg');

  if (hash === 'approved' || hash === 'denied') {
    icon.textContent  = approved ? '✓' : '✕';
    icon.style.background = approved ? 'rgba(76,175,80,.12)' : 'rgba(244,67,54,.12)';
    icon.style.color      = approved ? '#4CAF50' : '#f44336';
    title.textContent = approved ? 'Request Approved' : 'Request Denied';
    title.style.color = approved ? '#4CAF50' : '#f44336';
    msg.textContent   = approved
      ? 'The user has been notified. Their request has been approved.'
      : 'The user has been notified. Their request has been denied.';
  } else {
    icon.textContent      = '⚠';
    icon.style.background = 'rgba(255,152,0,.12)';
    title.textContent     = 'Unknown Response';
    msg.textContent       = 'This link may be invalid or expired.';
  }
})();
</script>
</body>
</html>
